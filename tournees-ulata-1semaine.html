<style>
:root {
  --bg:#0f1117; --surface:#171b26; --surface2:#1e2435; --border:#2a3045;
  --accent:#4fffb0; --accent2:#ff6b6b; --accent3:#ffd166;
  --text:#e8eaf0; --muted:#7a8099;
  --font-title:'Syne',sans-serif; --font-mono:'DM Mono',monospace;
  --c1:#4fffb0; --c2:#38bdf8; --c3:#fb923c; --c4:#e879f9; --c5:#fbbf24;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;}
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 20px;display:flex;align-items:center;gap:16px;
  position:sticky;top:0;z-index:1000;
}
.logo{font-family:var(--font-title);font-weight:800;font-size:1.05rem;letter-spacing:.05em;color:var(--accent);}
.logo span{color:var(--muted);font-weight:400;font-size:.75rem;margin-left:8px;}
.header-stats{display:flex;gap:18px;margin-left:auto;}
.hstat{text-align:center;font-size:.65rem;color:var(--muted);}
.hstat strong{display:block;font-family:var(--font-title);font-weight:700;font-size:1rem;color:var(--text);}
.app{display:grid;grid-template-columns:350px 1fr;height:calc(100vh - 53px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.filters{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;position:sticky;top:0;z-index:10;background:var(--surface);}
.filter-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.agent-tabs{display:flex;gap:5px;flex-wrap:wrap;}
.agent-tab{
  padding:4px 11px;border-radius:4px;border:1px solid var(--border);
  font-family:var(--font-mono);font-size:.7rem;cursor:pointer;
  background:transparent;color:var(--muted);transition:all .15s;
}
.agent-tab:hover{border-color:var(--accent);color:var(--accent);}
.agent-tab.active{color:var(--bg);font-weight:500;border-color:transparent;}
.agent-tab[data-agent="all"].active{background:var(--accent);}
.agent-tab[data-agent="1"].active{background:var(--c1);}
.agent-tab[data-agent="2"].active{background:var(--c2);}
.agent-tab[data-agent="3"].active{background:var(--c3);}
.agent-tab[data-agent="4"].active{background:var(--c4);}
.agent-tab[data-agent="5"].active{background:var(--c5);}
.day-tabs{display:flex;gap:5px;}
.day-tab{
  flex:1;padding:4px 6px;border-radius:4px;border:1px solid var(--border);
  font-family:var(--font-mono);font-size:.68rem;cursor:pointer;
  background:transparent;color:var(--muted);transition:all .15s;text-align:center;
}
.day-tab:hover{border-color:var(--accent);color:var(--accent);}
.day-tab.active{background:var(--accent);color:var(--bg);border-color:transparent;font-weight:500;}
.export-btn{
  margin:8px 10px 4px;padding:7px 14px;background:transparent;
  border:1px solid var(--accent);color:var(--accent);
  font-family:var(--font-mono);font-size:.68rem;border-radius:4px;cursor:pointer;
  transition:all .15s;
}
.export-btn:hover{background:var(--accent);color:var(--bg);}
.routes-list{padding:8px;display:flex;flex-direction:column;gap:7px;}
.route-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;overflow:hidden;cursor:pointer;transition:border-color .15s;
}
.route-card:hover{border-color:rgba(79,255,176,.4);}
.route-card.active{border-color:var(--accent);}
.route-card.hidden{display:none;}
.route-card-header{padding:9px 11px;display:flex;align-items:center;gap:9px;}
.route-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.route-meta{flex:1;min-width:0;}
.route-title{font-family:var(--font-title);font-weight:700;font-size:.8rem;color:var(--text);}
.route-sub{font-size:.62rem;color:var(--muted);margin-top:2px;}
.route-badges{display:flex;gap:4px;flex-shrink:0;}
.badge{font-size:.6rem;padding:2px 6px;border-radius:3px;background:var(--surface);border:1px solid var(--border);color:var(--muted);white-space:nowrap;}
.badge.warn{border-color:var(--accent3);color:var(--accent3);}
.badge.ok{border-color:var(--accent);color:var(--accent);}
.time-bar{height:3px;background:var(--surface);margin:0 11px 9px;border-radius:2px;overflow:hidden;}
.time-bar-fill{height:100%;border-radius:2px;}
.route-stops{max-height:0;overflow:hidden;transition:max-height .35s ease;border-top:0px solid var(--border);}
.route-card.active .route-stops{max-height:800px;border-top:1px solid var(--border);}
.stop-header{
  padding:6px 11px;font-size:.6rem;color:var(--muted);
  display:grid;grid-template-columns:70px 1fr 50px 40px 30px;gap:4px;
  border-bottom:1px solid var(--border);background:var(--bg);
  text-transform:uppercase;letter-spacing:.06em;
}
.stop-item{
  padding:6px 11px;font-size:.67rem;border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:70px 1fr 50px 40px 30px;gap:4px;align-items:start;
}
.stop-item:last-child{border-bottom:none;}
.stop-time{color:var(--accent3);font-size:.62rem;}
.stop-commune{color:var(--muted);font-size:.6rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.stop-school{color:var(--text);}
.stop-type{font-size:.58rem;padding:1px 4px;border-radius:2px;background:var(--surface);display:inline-block;margin-top:2px;}
.stop-type.college{background:#1e2a40;color:var(--c2);}
.stop-type.priv{background:#2a1e20;color:var(--accent2);}
.stop-poches{color:var(--accent3);font-size:.62rem;text-align:right;}
.map-panel{position:relative;}
#map{width:100%;height:100%;}
.map-legend{
  position:absolute;top:12px;right:12px;z-index:500;
  background:rgba(15,17,23,.92);border:1px solid var(--border);
  border-radius:6px;padding:10px 13px;font-size:.63rem;backdrop-filter:blur(6px);
}
.map-legend h4{font-family:var(--font-title);font-size:.7rem;margin-bottom:8px;color:var(--accent);}
.legend-item{display:flex;align-items:center;gap:7px;margin-bottom:3px;color:var(--muted);}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.info-bar{
  position:absolute;bottom:12px;left:12px;right:12px;z-index:500;
  background:rgba(15,17,23,.93);border:1px solid var(--border);
  border-radius:6px;padding:9px 14px;font-size:.68rem;backdrop-filter:blur(6px);
  display:none;align-items:center;gap:14px;
}
.info-bar.show{display:flex;}
.ib-title{font-family:var(--font-title);font-weight:700;font-size:.82rem;}
.ib-detail{color:var(--muted);font-size:.63rem;margin-top:2px;}
.ib-close{margin-left:auto;cursor:pointer;color:var(--muted);font-size:.9rem;}
.ib-close:hover{color:var(--text);}
.week-banner{
  background:var(--surface2);border-bottom:1px solid var(--border);
  padding:6px 14px;font-size:.65rem;color:var(--muted);
  display:flex;align-items:center;gap:8px;
}
.week-banner strong{color:var(--accent);font-family:var(--font-title);}
</style>
</head>

const AGENT_COLORS={1:'#4fffb0',2:'#38bdf8',3:'#fb923c',4:'#e879f9',5:'#fbbf24'};
const DEPOT=[43.8891,-0.4997];

const map=L.map('map',{center:[43.9,-0.7],zoom:9});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB',maxZoom:19}).addTo(map);
L.marker(DEPOT,{icon:L.divIcon({className:'',html:'<div style="font-size:16px;line-height:1">🏠</div>',iconSize:[20,20],iconAnchor:[10,10]})}).addTo(map).bindPopup('<b>Dépôt · Mont-de-Marsan</b>');

let allLayers=[], activeCard=null, filterAgent='all', filterDay='all';

// Build route layers
const routeData=[];
let idx=0;
Object.entries(PLAN).forEach(([agentName,days])=>{
  const agentNum=parseInt(agentName.split(' ')[1]);
  const color=AGENT_COLORS[agentNum];
  days.forEach(day=>{
    const coords=day.communes.map(c=>{
      const raw=COORDS[c]; if(!raw) return null;
      return [raw[0],raw[1]];
    }).filter(Boolean);
    const latlngs=[DEPOT,...coords,DEPOT];
    const poly=L.polyline(latlngs,{color,weight:2.5,opacity:.75});
    const markers=coords.map((ll,i)=>{
      const m=L.circleMarker(ll,{radius:5,fillColor:color,color:'#0f1117',weight:1.5,fillOpacity:.9});
      const arr=day.arrivals&&day.arrivals[i]?`<br><span style="color:#ffd166">⏱ ${day.arrivals[i]}</span>`:'';
      m.bindPopup(`<b>${day.communes[i]}</b>${arr}<br>${agentName} · ${day.jour}`);
      return m;
    });
    routeData.push({agentNum,agentName,day,poly,markers,idx:idx++});
  });
});

function renderMap(){
  allLayers.forEach(({poly,markers})=>{poly.remove();markers.forEach(m=>m.remove());});
  allLayers=[];
  routeData.forEach(rd=>{
    const show=(filterAgent==='all'||rd.agentNum===parseInt(filterAgent))&&(filterDay==='all'||rd.day.jour===filterDay);
    if(show){rd.poly.addTo(map);rd.markers.forEach(m=>m.addTo(map));allLayers.push(rd);}
  });
}

function renderSidebar(){
  const list=document.getElementById('routesList');
  list.innerHTML='';
  routeData.forEach(rd=>{
    const show=(filterAgent==='all'||rd.agentNum===parseInt(filterAgent))&&(filterDay==='all'||rd.day.jour===filterDay);
    const color=AGENT_COLORS[rd.agentNum];
    const h=Math.floor(rd.day.total_min/60),m=rd.day.total_min%60;
    const pct=Math.min(rd.day.total_min/390*100,100).toFixed(0);
    const badgeClass=rd.day.total_min>370?'warn':'ok';

    // Build stops HTML
    const stopsHtml=rd.day.schools.map((s,si)=>{
      const arr=rd.day.arrivals?rd.day.arrivals[rd.day.communes.indexOf(s.commune)]:'';
      const isCollege=s.type.toLowerCase().includes('collège');
      const isPriv=s.type.toLowerCase().includes('priv');
      const typeLabel=isCollege?'collège':(isPriv?'privé':'public');
      const typeClass=isCollege?'college':(isPriv?'priv':'');
      return `<div class="stop-item">
        <span class="stop-time">${arr}</span>
        <div>
          <div class="stop-school">${s.nom||'—'}</div>
          <span class="stop-type ${typeClass}">${typeLabel}</span>
        </div>
        <div class="stop-commune">${s.commune}</div>
        <span class="stop-poches">${s.poches}p</span>
        <span style="font-size:.6rem;color:var(--muted)">${s.effectifs>0?s.effectifs+'él':''}</span>
      </div>`;
    }).join('');

    const card=document.createElement('div');
    card.className='route-card'+(show?'':' hidden');
    card.dataset.idx=rd.idx;
    card.innerHTML=`
      <div class="route-card-header">
        <div class="route-dot" style="background:${color}"></div>
        <div class="route-meta">
          <div class="route-title">${rd.agentName} — ${rd.day.jour}</div>
          <div class="route-sub">${rd.day.communes.length} communes · ${rd.day.km} km · départ 9h30</div>
        </div>
        <div class="route-badges">
          <span class="badge ${badgeClass}">${h}h${String(m).padStart(2,'0')}</span>
          <span class="badge">${rd.day.nb_stops} arrêts</span>
        </div>
      </div>
      <div class="time-bar"><div class="time-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="route-stops">
        <div class="stop-header"><span>Heure</span><span>Établissement</span><span>Commune</span><span>Poches</span><span>Élèves</span></div>
        ${stopsHtml}
      </div>`;

    card.addEventListener('click',()=>{
      if(activeCard===rd.idx){
        card.classList.remove('active');activeCard=null;
        document.getElementById('infoBar').classList.remove('show');
        renderMap();
      } else {
        document.querySelectorAll('.route-card').forEach(c=>c.classList.remove('active'));
        card.classList.add('active');activeCard=rd.idx;
        allLayers.forEach(l=>l.poly.setStyle({opacity:.15,weight:1.5}));
        const target=allLayers.find(l=>l.idx===rd.idx);
        if(target){
          target.poly.setStyle({opacity:1,weight:3.5});
          try{map.fitBounds(target.poly.getBounds(),{padding:[40,40]});}catch(e){}
        }
        const h2=Math.floor(rd.day.total_min/60),m2=rd.day.total_min%60;
        document.getElementById('ibTitle').textContent=`${rd.agentName} · ${rd.day.jour}`;
        document.getElementById('ibDetail').textContent=`${rd.day.nb_stops} arrêts · ${rd.day.km} km · ~${h2}h${String(m2).padStart(2,'0')} · Mont-de-Marsan → ${rd.day.communes.slice(0,4).join(' → ')}${rd.day.communes.length>4?' → …':''}`;
        document.getElementById('infoBar').classList.add('show');
      }
    });
    list.appendChild(card);
  });
}

// Filters
document.querySelectorAll('.agent-tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.agent-tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); filterAgent=t.dataset.agent; activeCard=null; renderMap(); renderSidebar();
}));
document.querySelectorAll('.day-tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.day-tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); filterDay=t.dataset.day; activeCard=null; renderMap(); renderSidebar();
}));

document.getElementById('ibClose').addEventListener('click',()=>{
  document.getElementById('infoBar').classList.remove('show');
  document.querySelectorAll('.route-card').forEach(c=>c.classList.remove('active'));
  activeCard=null; renderMap();
});

// CSV Export
document.getElementById('exportBtn').addEventListener('click',()=>{
  const rows=['\uFEFFAgent,Jour,Heure estimée,Ordre,Commune,Établissement,Type,Pochettes,Effectifs'];
  Object.entries(PLAN).forEach(([agent,days])=>{
    days.forEach(day=>{
      let order=1;
      day.communes.forEach((commune,ci)=>{
        const arr=day.arrivals&&day.arrivals[ci]?day.arrivals[ci]:'';
        const schools=day.schools.filter(s=>s.commune===commune);
        schools.forEach(s=>{
          rows.push([agent,day.jour,arr,order++,
            `"${commune}"`,`"${(s.nom||'').replace(/"/g,'""')}"`,
            `"${s.type}"`,s.poches,s.effectifs].join(','));
        });
      });
    });
  });
  const blob=new Blob([rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='tournees-ulata-1semaine.csv';a.click();
  URL.revokeObjectURL(url);
});

renderMap();
renderSidebar();
} // end initApp
</script>
</body>
</html>
